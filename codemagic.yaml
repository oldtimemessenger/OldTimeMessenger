workflows:
  react-native-android:
    name: React Native Android
    max_build_duration: 120
    instance_type: linux_x2
    environment:
      groups:
        - supabase
      vars:
        PACKAGE_NAME: "com.oldtime.messenger"
      node: 20
    scripts:
      - name: Install npm dependencies
        script: |
          npm install

      - name: Write .env from Codemagic secrets
        script: |
          echo "EXPO_PUBLIC_SUPABASE_URL=$EXPO_PUBLIC_SUPABASE_URL" >> .env
          echo "EXPO_PUBLIC_SUPABASE_ANON_KEY=$EXPO_PUBLIC_SUPABASE_ANON_KEY" >> .env

      - name: Prebuild native Android project
        script: |
          npx expo prebuild --platform android --clean

      - name: Build Android release
        script: |
          cd android
          ./gradlew bundleRelease --no-daemon
    artifacts:
      - android/app/build/outputs/**/*.aab
      - android/app/build/outputs/**/*.apk
